name: Weekly Engagement Report

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run engagement script
        env:
          PARSELY_KEY:    ${{ secrets.PARSELY_KEY }}
          PARSELY_SECRET: ${{ secrets.PARSELY_SECRET }}
          SMTP_EMAIL:     ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD:  ${{ secrets.SMTP_PASSWORD }}
        run: python cronkite_engagement.py

      - name: Prepare output folder
        run: |
          mkdir -p dist
          cp cronkite_report_*.html dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "Weekly report - ${{ github.run_id }}"
